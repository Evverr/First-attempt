<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой первый сайт</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding-top: 50px;
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007acc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #005f99;
        }
    </style>
</head>
<body>

    <h1>Привет, GitHub 🚀</h1>
    <p>Это мой первый простой сайт</p>

    <button onclick="showMessage()">Нажми меня</button>

    <script>
        function showMessage() {
            alert("Сайт работает 🎉");
        }
    </script>

</body>
</html>
